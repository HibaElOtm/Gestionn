<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Exercice 1 – Figures 1 à 4</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#1a1a2e; color:#fff; padding:2rem; }

    h1 { color:#e07a5f; font-style:italic; text-decoration:underline; font-size:1.6rem; margin-bottom:1.5rem; }
    h2 { color:#81b4ea; font-size:1.2rem; margin-bottom:1rem; }
    p  { margin-bottom:.6rem; font-size:.95rem; }

    .exercice { margin-bottom:3rem; }
    .methode-label {
      display:inline-block; background:#2a2a4a;
      color:#81b4ea; font-size:.82rem; padding:.3rem .8rem;
      border-left:3px solid #81b4ea; margin-bottom:1rem;
    }

    /* ════════════════════════════════
       COULEURS COMMUNES
    ════════════════════════════════ */
    .rouge  { background:#D4A0A0; }   /* rose/rouge doux */
    .beige  { background:#C4B99A; }   /* beige/sable     */
    .bleu   { background:#6B9DC4; }   /* bleu            */
    .blanc  { background:#fff;    border:1px solid #ccc; }

    /* ════════════════════════════════
       GRILLE D'AFFICHAGE DES FIGURES
    ════════════════════════════════ */
    .figures-row {
      display:flex; flex-wrap:wrap; gap:2.5rem;
      margin:2.5rem 0;
    }
    .figure-block { text-align:center; }
    .figure-label {
      color:#81b4ea; font-size:.82rem; font-style:italic;
      margin-top:.6rem; font-weight:600;
    }

    /* ════════════════════════════════
       MÉTHODE 1 — POSITIONNEMENT ABSOLU
    ════════════════════════════════ */

    /* --- FIGURE 1 (absolu) ---
       3 blocs empilés verticalement dans un conteneur
    */
    .fig1-abs {
      position:relative;
      width:100px; height:180px;
    }
    .fig1-abs .b1 { position:absolute; top:0;    left:0; width:80px;  height:55px; }
    .fig1-abs .b2 { position:absolute; top:58px; left:0; width:80px;  height:55px; }
    .fig1-abs .b3 { position:absolute; top:116px;left:0; width:80px; height:55px; }

    /* --- FIGURE 2 (absolu) ---
       Grand blanc + petits blocs superposés (L inversé)
    */
    .fig2-abs {
      position:relative;
      width:175px; height:155px;
      background:#fff; border:1px solid #ccc;
    }
    .fig2-abs .b1 { position:absolute; top:0;   left:0;   width:140px; height:80px; }
    .fig2-abs .b2 { position:absolute; top:80px;left:0;   width:80px;  height:70px; }
    .fig2-abs .b3 { position:absolute; top:80px;left:95px;width:75px;  height:70px; }

    /* --- FIGURE 3 (absolu) ---
       Grand rouge en haut, deux petits en bas
    */
    .fig3-abs {
      position:relative;
      width:230px; height:155px;
    }
    .fig3-abs .b1 { position:absolute; top:0;    left:0;    width:230px; height:80px; }
    .fig3-abs .b2 { position:absolute; top:85px; left:0;    width:110px; height:65px; }
    .fig3-abs .b3 { position:absolute; top:85px; left:115px;width:110px; height:65px; }

    /* --- FIGURE 4 (absolu) ---
       2 colonnes : gauche (rouge+beige), droite (bleu+blanc)
    */
    .fig4-abs {
      position:relative;
      width:200px; height:155px;
    }
    .fig4-abs .b1 { position:absolute; top:0;    left:0;    width:95px;  height:80px; }
    .fig4-abs .b2 { position:absolute; top:0;    left:100px;width:95px;  height:80px; }
    .fig4-abs .b3 { position:absolute; top:85px; left:0;    width:95px;  height:65px; }
    .fig4-abs .b4 { position:absolute; top:85px; left:100px;width:95px;  height:65px; background:#fff; border:1px solid #ccc; }

    /* ════════════════════════════════
       MÉTHODE 2 — POSITIONNEMENT RELATIF (FLEXBOX)
    ════════════════════════════════ */

    /* --- FIGURE 1 (relatif / flex colonne) --- */
    .fig1-rel {
      display:flex; flex-direction:column; gap:3px;
      width:100px;
    }
    .fig1-rel .b1 { width:80px;  height:55px; }
    .fig1-rel .b2 { width:80px;  height:55px; }
    .fig1-rel .b3 { width:80px; height:55px; }

    /* --- FIGURE 2 (relatif / flex) --- */
    .fig2-rel {
      width:175px; height:155px;
      background:#fff; border:1px solid #ccc;
      display:flex; flex-direction:column; gap:3px;
    }
    .fig2-rel .top    { width:140px; height:80px; }
    .fig2-rel .bottom { display:flex; gap:3px; }
    .fig2-rel .bottom .b2 { width:80px; height:70px; }
    .fig2-rel .bottom .b3 { width:75px; height:70px; }

    /* --- FIGURE 3 (relatif / flex) --- */
    .fig3-rel {
      width:230px;
      display:flex; flex-direction:column; gap:3px;
    }
    .fig3-rel .top { width:230px; height:80px; }
    .fig3-rel .bottom { display:flex; gap:3px; }
    .fig3-rel .bottom .b2 { width:110px; height:65px; }
    .fig3-rel .bottom .b3 { width:110px; height:65px; }

    /* --- FIGURE 4 (relatif / flex) --- */
    .fig4-rel {
      width:200px;
      display:flex; flex-direction:column; gap:3px;
    }
    .fig4-rel .row-top,
    .fig4-rel .row-bot { display:flex; gap:3px; }
    .fig4-rel .b1 { width:95px;  height:80px; }
    .fig4-rel .b2 { width:95px;  height:80px; }
    .fig4-rel .b3 { width:95px;  height:65px; }
    .fig4-rel .b4 { width:95px;  height:65px; background:#fff; border:1px solid #ccc; }
  </style>
</head>
<body>
<a href="compterendutp2.html"><-retour</a>
<h2>Exercice 1</h2>
 <! methode positionnement absolue>
  <div class="figures-row">

    <!-- Figure 1 -->
    <div class="figure-block">
      <div class="fig1-abs">
        <div class="b1 rouge"></div>
        <div class="b2 beige"></div>
        <div class="b3 bleu"></div>
      </div>
      <div class="figure-label">Figure 1</div>
    </div>

    <!-- Figure 2 -->
    <div class="figure-block">
      <div class="fig2-abs">
        <div class="b1 rouge"></div>
        <div class="b2 beige"></div>
        <div class="b3 bleu"></div>
      </div>
      <div class="figure-label">Figure 2</div>
    </div>

    <!-- Figure 3 -->
    <div class="figure-block">
      <div class="fig3-abs">
        <div class="b1 rouge"></div>
        <div class="b2 beige"></div>
        <div class="b3 bleu"></div>
      </div>
      <div class="figure-label">Figure 3</div>
    </div>

    <!-- Figure 4 -->
    <div class="figure-block">
      <div class="fig4-abs">
        <div class="b1 rouge"></div>
        <div class="b2 bleu"></div>
        <div class="b3 beige"></div>
        <div class="b4"></div>
      </div>
      <div class="figure-label">Figure 4</div>
    </div>

  </div>
</div>
<!methode positionnement relatif>
<div class="exercice">

  <div class="figures-row">

    <!-- Figure 1 -->
    <div class="figure-block">
      <div class="fig1-rel">
        <div class="b1 rouge"></div>
        <div class="b2 beige"></div>
        <div class="b3 bleu"></div>
      </div>
      <div class="figure-label">Figure 1</div>
    </div>

    <!-- Figure 2 -->
    <div class="figure-block">
      <div class="fig2-rel">
        <div class="top rouge"></div>
        <div class="bottom">
          <div class="b2 beige"></div>
          <div class="b3 bleu"></div>
        </div>
      </div>
      <div class="figure-label">Figure 2</div>
    </div>

    <!-- Figure 3 -->
    <div class="figure-block">
      <div class="fig3-rel">
        <div class="top rouge"></div>
        <div class="bottom">
          <div class="b2 beige"></div>
          <div class="b3 bleu"></div>
        </div>
      </div>
      <div class="figure-label">Figure 3</div>
    </div>

    <!-- Figure 4 -->
    <div class="figure-block">
      <div class="fig4-rel">
        <div class="row-top">
          <div class="b1 rouge"></div>
          <div class="b2 bleu"></div>
        </div>
        <div class="row-bot">
          <div class="b3 beige"></div>
          <div class="b4"></div>
        </div>
      </div>
      <div class="figure-label">Figure 4</div>
    </div>

  </div>
</div>

</body>
</html>
