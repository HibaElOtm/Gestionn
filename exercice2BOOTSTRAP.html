<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Layout Figure 5 – Bootstrap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body { 
     background: #e8e8e8;
     padding: 1rem; }

    .page-wrapper {
      max-width: 960px;
      margin: 0 auto;
    }

    /* ── Sections couleurs ── */
    .s-header  { background: #6B8DB5; color: #fff;    min-height: 70px;  }
    .s-section0{ background: #C4B99A; color: #3a3020; min-height: 55px;  }
    .s-s1      { background: #C5D5E8; color: #2a4060; min-height: 130px; }
    .s-s2      { background: #E8C5C5; color: #602a2a; min-height: 130px; }
    .s-s3      { background: #C5E0C5; color: #2a5030; min-height: 130px; }
    .s-s4      { background: #E8D5B0; color: #604810; min-height: 130px; }
    .s-s5      { background: #1AAEDC; color: #05334a; min-height: 90px;  }
    .s-s6      { background: #17A2C8; color: #05334a; min-height: 90px;  }
    .s-footer  { background: #C0B8D0; color: #3a3050; min-height: 65px;  }

    /* ── Texte centré dans chaque section ── */
    .section-box {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
      font-family: 'Segoe UI', sans-serif;
      padding: 1rem;
    }

    .row { margin-bottom: 6px ; }
    .row > [class*="col"] { padding-left: 3px; padding-right: 3px; }
    .page-wrapper > .row:first-child { margin-top: 0; }
  </style>
</head>
<body>
<a href="compterendutp2.html"><-retour</a>
<div class="page-wrapper">

  <! ==== HEADER ===>
  <div class="row">
    <div class="col-12">
      <div class="section-box s-header">
        En-tête de page
      </div>
    </div>
  </div>

  <!-- ═══ SECTION 0 ═══ -->
  <div class="row">
    <div class="col-12">
      <div class="section-box s-section0">
        Section 0
      </div>
    </div>
  </div>

  <!-- ═══ SECTIONS 1 – 4 ═══
       Desktop  : 4 colonnes  (col-md-3)
       Tablette : 2 colonnes  (col-sm-6)   ← Figure 5.1
       Mobile   : 1 colonne   (col-12)     ← Figure 5.2
  ═══════════════════════════════════════ -->
  <div class="row">
    <div class="col-12 col-sm-6 col-md-3 mb-1">
      <div class="section-box s-s1">Section 1</div>
    </div>
    <div class="col-12 col-sm-6 col-md-3 mb-1">
      <div class="section-box s-s2">Section 2</div>
    </div>
    <div class="col-12 col-sm-6 col-md-3 mb-1">
      <div class="section-box s-s3">Section 3</div>
    </div>
    <div class="col-12 col-sm-6 col-md-3 mb-1">
      <div class="section-box s-s4">Section 4</div>
    </div>
  </div>

  <!-- ═══ SECTIONS 5 – 6 ═══
       Desktop  : 2 colonnes  (col-md-6)
       Tablette : 1 colonne   (col-sm-12)  ← Figure 5.1
       Mobile   : 1 colonne   (col-12)     ← Figure 5.2
  ═══════════════════════════════════════ -->
  <div class="row">
    <div class="col-12 col-md-6 mb-1">
      <div class="section-box s-s5">Section 5</div>
    </div>
    <div class="col-12 col-md-6 mb-1">
      <div class="section-box s-s6">Section 6</div>
    </div>
  </div>

  <!-- ═══ FOOTER ═══ -->
  <div class="row">
    <div class="col-12">
      <div class="section-box s-footer">
        Pied de page
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
